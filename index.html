<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense &amp; Budget Visualizer</title>
  <link rel="stylesheet" href="css/style.css" />

  <!-- Theme detection: read localStorage before first paint to avoid flash of wrong theme (Req 8.3) -->
  <script>
    (function () {
      try {
        var theme = localStorage.getItem('ebv_theme');
        if (theme === 'dark' || theme === 'light') {
          document.documentElement.setAttribute('data-theme', theme);
        }
      } catch (e) {
        // localStorage unavailable — default light theme is fine
      }
    })();
  </script>
</head>
<body data-theme="light">

  <header>
    <h1>Expense &amp; Budget Visualizer</h1>
    <button id="theme-toggle" type="button">🌙 Dark Mode</button>
  </header>

  <main>

    <!-- Balance Card -->
    <section id="balance-card" aria-label="Total Balance">
      <h2>Total Balance</h2>
      <p id="balance-amount">$0.00</p>
    </section>

    <!-- Transaction Form -->
    <section id="form-section">
      <form id="transaction-form" novalidate>
        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="e.g. Lunch" autocomplete="off" />
        <span class="error" id="name-error" role="alert" aria-live="polite"></span>

        <label for="amount">Amount</label>
        <input type="number" id="amount" name="amount" step="0.01" placeholder="e.g. 12.50" />
        <span class="error" id="amount-error" role="alert" aria-live="polite"></span>

        <label for="category">Category</label>
        <select id="category" name="category">
          <option value="">Select…</option>
          <option value="Food">Food</option>
          <option value="Transport">Transport</option>
          <option value="Fun">Fun</option>
        </select>
        <span class="error" id="category-error" role="alert" aria-live="polite"></span>

        <button type="submit">Add Transaction</button>
      </form>
    </section>

    <!-- Controls: Sort + Threshold -->
    <section id="controls-section" aria-label="Controls">
      <div id="sort-controls">
        <label for="sort-select">Sort by</label>
        <select id="sort-select">
          <option value="AMOUNT_ASC">Amount ↑</option>
          <option value="AMOUNT_DESC">Amount ↓</option>
          <option value="CATEGORY_ASC">Category A–Z</option>
        </select>
      </div>
      <div id="threshold-controls">
        <label for="threshold-input">Budget Threshold</label>
        <input type="number" id="threshold-input" step="0.01"
               placeholder="e.g. 50.00" min="0" />
      </div>
    </section>

    <!-- Transaction List -->
    <section id="list-section">
      <h2>Transactions</h2>
      <ul id="transaction-list" aria-label="Transaction list">
        <!-- items rendered by JS -->
      </ul>
    </section>

    <!-- Chart -->
    <section id="chart-section">
      <h2>Spending by Category</h2>
      <div id="chart-placeholder" hidden>No data to display</div>
      <canvas id="pie-chart" aria-label="Spending pie chart" role="img"></canvas>
    </section>

  </main>

  <!-- Global Error Banner (shown on localStorage failures) -->
  <div id="global-error" role="alert" aria-live="assertive" hidden></div>

  <!-- Chart.js CDN (pinned to v4) — must load before app.js -->
  <script
    src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"
    onerror="document.getElementById('chart-section').innerHTML='<p>Chart unavailable</p>'; document.getElementById('chart-section').style.display='block';"
  ></script>
  <script src="js/app.js"></script>

</body>
</html>
